<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Paw-dyssey</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0015; display:flex; justify-content:center;
           align-items:center; width:100vw; height:100vh; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const W          = 360;
const H          = 640;
const WALL_W     = 14;
const TOP_BAR_H  = 90;
const TOP_WALL_H = 18;
const BOT_BAR_Y  = 572;
const MECH_Y     = 524;
const FORCE_Y    = MECH_Y - 46;           // 478
const PLAY_T     = TOP_BAR_H + TOP_WALL_H; // 108
const PLAY_L     = WALL_W;                 // 14
const PLAY_R     = W - WALL_W;             // 346
const PLAY_H     = FORCE_Y - PLAY_T;       // 370

const BLOCK_SIZE = 19;
const COLS       = 10;
const GRID_W     = COLS * BLOCK_SIZE;               // 190
const GRID_X     = Math.round((W - GRID_W) / 2);   // 85
const GRID_Y     = PLAY_T + 3 * BLOCK_SIZE;         // 165

const BALL_R     = 7;
const BALL_SPEED = 640;
const BALL_LIFE  = 5000;    // ← 5 seconds
const MAX_BOUNCE = 140;
const BALL_WHITE = 0xfff8dc;
const CYCLE_MS   = 8000;    // 4 whole notes @120 BPM
const SLIDE_DUR  = 400;     // wall slide animation ms

const C = { r:0xe74c3c, b:0x3498db, g:0x2ecc71, y:0xf1c40f, p:0xe91e8c, c:0x00bcd4 };
const S = { POS:'pos', AIM:'aim', SHOOT:'shoot', END:'end' };

// ═══════════════════════════════════════════════════════════
//  LEVELS
//  Walls use EQUAL segments (enables clean sliding animation).
//  Blocks are aligned to their nearest wall segment at t=0.
//
//  Vertical wall segment boundaries (2 segs → each 185px):
//    seg0: y=108..293  seg1: y=293..478
//  Grid rows 0-6 centers: y=174..298 → rows 0-6 span both segs.
//    seg0 rows: where center y < 293 → rows 0-6 approx (5-row grids all seg0)
//  Horizontal top-wall (2 segs → each 166px):
//    seg0: x=14..180   seg1: x=180..346
//    col centers: col0=94, col4=170 → seg0; col5=189, col9=265 → seg1
//    → cols 0-4 = seg0 colour, cols 5-9 = seg1 colour
// ═══════════════════════════════════════════════════════════
const LEVELS = [
  {
    title:'LEVEL 1', shots:20,
    // left: top='r' bottom='b' | right: top='g' bottom='y' | top: left='p' right='c'
    walls:{ left:['r','b'], right:['g','y'], top:['p','c'] },
    grid:[
      'rrrppccggg',
      'rrrppccggg',
      'bbbppccyyy',
      'bbbppccyyy',
      'rrrppccggg',
    ],
  },
  {
    title:'LEVEL 2', shots:28,
    // left: top='b' bottom='c' | right: top='r' bottom='g' | top: left='y' right='p'
    walls:{ left:['b','c'], right:['r','g'], top:['y','p'] },
    grid:[
      'bbbyypprrr',
      'bbbyypprrr',
      'bbbyypprrr',
      'cccyyppggg',
      'cccyyppggg',
      'bbbyypprrr',
    ],
  },
  {
    title:'LEVEL 3', shots:38,
    // left: r/g/b (3 segs, ~123px each) | right: y/p/c | top: left='b' right='c'
    walls:{ left:['r','g','b'], right:['y','p','c'], top:['b','c'] },
    // rows 0-2 → left-seg0='r', right-seg0='y'
    // rows 3-5 → left-seg1='g', right-seg1='p'
    // row  6   → left-seg2='b', right-seg2='c'  (also top wall colors!)
    grid:[
      'rrrbbccyyy',
      'rrrbbccyyy',
      'rrrbbccyyy',
      'gggbbccppp',
      'gggbbccppp',
      'gggbbccppp',
      'bbbbbccccc',
    ],
  },
];

function cellXY(r, c) {
  return { x: GRID_X + c * BLOCK_SIZE, y: GRID_Y + r * BLOCK_SIZE };
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  create() { this.scene.start('Game', { lvIdx:0, score:0 }); }
}

// ═══════════════════════════════════════════════════════════
//  GAME SCENE
// ═══════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init({ lvIdx=0, score=0 }) {
    this.lvIdx=lvIdx; this.score=score; this.state=S.POS;
    this.mechX=W/2; this.ball=null; this.ballColor=null;
    this.bounces=0; this.cycleElapsed=0;
  }

  create() {
    const lv = LEVELS[this.lvIdx];
    this.shots = lv.shots;
    this._buildBG();
    this._buildWalls(lv.walls);
    this._buildForcefield();
    this._buildGrid(lv.grid);
    this._buildTopBar();
    this._buildBottomBar();
    this._buildMech();
    this._buildInput();
    this._startCycleTimer();
    this._refreshUI();
    this._refreshHint();
  }

  update(_, delta) {
    if (this.state === S.END) return;
    // Cycle progress bar
    this.cycleElapsed = (this.cycleElapsed + delta) % CYCLE_MS;
    if (this.cycleBar) this.cycleBar.scaleX = 1 - this.cycleElapsed / CYCLE_MS;
    // Ball step
    if (this.state === S.SHOOT && this.ball) {
      const sub = delta / 1000 / 3;
      for (let i = 0; i < 3 && this.ball; i++) this._stepBall(sub);
      // Countdown label when < 3s remain
      if (this.ball && this.lifeTxt) {
        const rem = BALL_LIFE - (this.time.now - this.ball._born);
        if (rem < 3000) {
          this.lifeTxt
            .setText(`${Math.ceil(rem / 1000)}s`)
            .setPosition(this.ball.x + 10, this.ball.y - 14)
            .setVisible(true);
        } else {
          this.lifeTxt.setVisible(false);
        }
      }
    }
  }

  // ── Background ──────────────────────────────────────────
  _buildBG() {
    this.add.rectangle(W/2, H/2, W, H, 0x1e0d35);
    const g = this.add.graphics().setDepth(0);
    g.fillStyle(0x2d1553, 0.38);
    [[70,230],[292,252],[88,368],[280,390],[56,480],[308,460]].forEach(([x,y]) => {
      g.fillCircle(x,y,10);
      [[-9,-11],[9,-11],[-13,-2],[13,-2]].forEach(([dx,dy]) => g.fillCircle(x+dx,y+dy,5));
    });
    this.aimGfx = this.add.graphics().setDepth(100);
  }

  // ── Segmented LED walls (equal segments + geometry mask) ─
  _buildWalls(wallDef) {
    this.wallData = {};

    const make = (key, colors, isVert, baseX, baseY, totalLen, thick) => {
      const n = colors.length;
      const segLen = totalLen / n;

      // Geometry mask: only pixels inside this rect are visible
      const mg = this.make.graphics({ add:false });
      mg.fillStyle(0xffffff);
      mg.fillRect(baseX, baseY, isVert ? thick : totalLen, isVert ? totalLen : thick);
      const mask = mg.createGeometryMask();

      // One rect per colour segment
      const rects = colors.map((k, i) => {
        const rx = isVert ? baseX : baseX + i * segLen;
        const ry = isVert ? baseY + i * segLen : baseY;
        const r = this.add.rectangle(rx, ry,
          isVert ? thick : segLen,
          isVert ? segLen : thick,
          C[k]
        ).setOrigin(0, 0).setDepth(1);
        r.setStrokeStyle(1.5, 0x000000, 0.2);
        r.setMask(mask);
        return r;
      });

      // Outline drawn over the top (no mask needed — stays fixed)
      const og = this.add.graphics().setDepth(2);
      og.lineStyle(2, 0x7c3aed, 0.65);
      og.strokeRect(baseX, baseY, isVert ? thick : totalLen, isVert ? totalLen : thick);

      this.wallData[key] = { rects, colors:[...colors], n, segLen,
                             isVert, baseX, baseY, totalLen, thick, mask };
    };

    make('left',  wallDef.left,  true,  0,        PLAY_T,    PLAY_H,       WALL_W);
    make('right', wallDef.right, true,  W-WALL_W, PLAY_T,    PLAY_H,       WALL_W);
    make('top',   wallDef.top,   false, PLAY_L,   TOP_BAR_H, PLAY_R-PLAY_L, TOP_WALL_H);
  }

  /** Which wall segment colour does the ball occupy at (bx, by)? */
  _wallSegColor(side, bx, by) {
    const w = this.wallData[side];
    const pos  = w.isVert ? by : bx;
    const base = w.isVert ? w.baseY : w.baseX;
    const idx  = Phaser.Math.Clamp(Math.floor((pos - base) / w.segLen), 0, w.n - 1);
    return w.colors[idx];
  }

  // ── LED cycle timer + progress bar ───────────────────────
  _startCycleTimer() {
    this.cycleBar = this.add.rectangle(PLAY_L, PLAY_T - 5, PLAY_R - PLAY_L, 4, 0xffffff, 0.4)
      .setOrigin(0, 0).setDepth(3);
    this.time.addEvent({ delay:CYCLE_MS, callback:this._doCycle, callbackScope:this, loop:true });
  }

  /**
   * CLOCKWISE TRAIN ANIMATION
   *
   * All three walls are treated as ONE continuous colour chain flowing clockwise:
   *   left (bottom→top) → top (left→right) → right (top→bottom) → wraps back to left bottom
   *
   * On each cycle the chain advances by 1 slot clockwise:
   *   - Left wall  : colours slide UPWARD   (new colour enters from bottom)
   *   - Top wall   : colours slide RIGHTWARD (new colour enters from left)
   *   - Right wall : colours slide DOWNWARD  (new colour enters from top)
   *
   * Logical colours are updated immediately so collision detection is always
   * correct; the visual animation then plays over SLIDE_DUR ms.
   */
  _doCycle() {
    if (this.state === S.END) return;

    const ld = this.wallData['left'];
    const td = this.wallData['top'];
    const rd = this.wallData['right'];

    // Build the clockwise chain (left stored top→bottom, so reverse for chain)
    const chain = [...[...ld.colors].reverse(), ...td.colors, ...rd.colors];
    const total = chain.length;

    // Rotate clockwise by 1: last element (right-bottom) wraps to front (left-bottom)
    const nc = [chain[total - 1], ...chain.slice(0, total - 1)];

    // Redistribute back (left needs un-reversing to top→bottom)
    const newLeft  = nc.slice(0, ld.n).reverse();
    const newTop   = nc.slice(ld.n, ld.n + td.n);
    const newRight = nc.slice(ld.n + td.n);

    // Update logical state immediately
    ld.colors = newLeft;
    td.colors = newTop;
    rd.colors = newRight;

    // Animate each wall in its clockwise direction
    this._slideWall(ld, 'up');
    this._slideWall(td, 'right');
    this._slideWall(rd, 'down');
  }

  /** Slide wall rects in the given direction by one segment, entering/exiting correctly. */
  _slideWall(w, dir) {
    const { baseX, baseY, segLen, thick, n, mask, colors } = w;
    const old = [...w.rects];

    if (dir === 'right') {
      // New rect enters from the left edge
      const nr = this.add.rectangle(baseX - segLen, baseY, segLen, thick, C[colors[0]])
        .setOrigin(0,0).setStrokeStyle(1.5,0x000000,0.2).setMask(mask).setDepth(1);
      this.tweens.add({ targets: nr, x: baseX, duration: SLIDE_DUR, ease: 'Cubic.InOut' });
      old.forEach(r => this.tweens.add({ targets: r, x: r.x + segLen, duration: SLIDE_DUR, ease: 'Cubic.InOut' }));
      this.time.delayedCall(SLIDE_DUR + 30, () => {
        old[n - 1].destroy();
        w.rects = [nr, ...old.slice(0, n - 1)];
      });

    } else if (dir === 'down') {
      // New rect enters from the top edge
      const nr = this.add.rectangle(baseX, baseY - segLen, thick, segLen, C[colors[0]])
        .setOrigin(0,0).setStrokeStyle(1.5,0x000000,0.2).setMask(mask).setDepth(1);
      this.tweens.add({ targets: nr, y: baseY, duration: SLIDE_DUR, ease: 'Cubic.InOut' });
      old.forEach(r => this.tweens.add({ targets: r, y: r.y + segLen, duration: SLIDE_DUR, ease: 'Cubic.InOut' }));
      this.time.delayedCall(SLIDE_DUR + 30, () => {
        old[n - 1].destroy();
        w.rects = [nr, ...old.slice(0, n - 1)];
      });

    } else if (dir === 'up') {
      // New rect enters from the bottom edge
      const nr = this.add.rectangle(baseX, baseY + n * segLen, thick, segLen, C[colors[n - 1]])
        .setOrigin(0,0).setStrokeStyle(1.5,0x000000,0.2).setMask(mask).setDepth(1);
      this.tweens.add({ targets: nr, y: baseY + (n - 1) * segLen, duration: SLIDE_DUR, ease: 'Cubic.InOut' });
      old.forEach(r => this.tweens.add({ targets: r, y: r.y - segLen, duration: SLIDE_DUR, ease: 'Cubic.InOut' }));
      this.time.delayedCall(SLIDE_DUR + 30, () => {
        old[0].destroy();
        w.rects = [...old.slice(1), nr];
      });
    }
  }

  // ── One-way Forcefield ───────────────────────────────────
  _buildForcefield() {
    this.add.rectangle(PLAY_L, FORCE_Y-4, PLAY_R-PLAY_L, 8, 0x00ffff, 0.15).setOrigin(0,0).setDepth(5);
    const glow = this.add.rectangle(PLAY_L, FORCE_Y-2, PLAY_R-PLAY_L, 4, 0x00ffff, 0.55).setOrigin(0,0).setDepth(5);
    this.tweens.add({ targets:glow, alpha:0.12, duration:950, yoyo:true, repeat:-1, ease:'Sine.InOut' });
    const ag = this.add.graphics().setDepth(5);
    ag.fillStyle(0x00ffff, 0.5);
    for (let x = PLAY_L + 16; x < PLAY_R - 8; x += 28)
      ag.fillTriangle(x, FORCE_Y-1, x+7, FORCE_Y-1, x+3.5, FORCE_Y-8);
    this.add.text(W/2, FORCE_Y-16, '— FORCEFIELD —', { fontSize:'8px', fill:'#00ffff' })
      .setOrigin(0.5, 1).setAlpha(0.55).setDepth(5);
  }

  // ── Block grid ───────────────────────────────────────────
  _buildGrid(rows) {
    this.grid = rows.map((rowStr, r) =>
      Array.from({ length:COLS }, (_, c) => {
        const k = rowStr[c];
        if (!k || k === '.') return null;
        const { x, y } = cellXY(r, c);
        const rect = this.add.rectangle(
          x+BLOCK_SIZE/2, y+BLOCK_SIZE/2, BLOCK_SIZE-2, BLOCK_SIZE-2, C[k]
        ).setDepth(3);
        rect.setStrokeStyle(1, 0x000000, 0.3);
        rect.setScale(0.05);
        this.tweens.add({ targets:rect, scaleX:1, scaleY:1, duration:100,
          ease:'Back.Out', delay:(r*COLS+c)*5 });
        return { key:k, rect };
      })
    );
  }

  // ── Top bar (cat head) ───────────────────────────────────
  _buildTopBar() {
    const g = this.add.graphics().setDepth(10);
    g.fillStyle(0x120826);
    g.fillRect(0, 0, W, TOP_BAR_H-20);
    g.fillRoundedRect(0, TOP_BAR_H-40, W, 48, { bl:26, br:26, tl:0, tr:0 });
    g.fillStyle(0x7c3aed);
    g.fillTriangle(42,2,86,2,64,-28); g.fillTriangle(W-86,2,W-42,2,W-64,-28);
    g.fillStyle(0xe91e8c, 0.65);
    g.fillTriangle(50,2,78,2,64,-18); g.fillTriangle(W-78,2,W-50,2,W-64,-18);
    g.lineStyle(2, 0x7c3aed, 0.85);
    g.strokeRoundedRect(0, 0, W, TOP_BAR_H, { bl:26, br:26, tl:0, tr:0 });
    g.strokeTriangle(42,2,86,2,64,-28); g.strokeTriangle(W-86,2,W-42,2,W-64,-28);
    this.add.text(14,  8, 'AMMO', { fontSize:'10px', fill:'#a78bfa', fontStyle:'bold' }).setDepth(11);
    this.ammoTxt  = this.add.text(14, 22, '', { fontSize:'24px', fill:'#fff', fontStyle:'bold' }).setDepth(11);
    this.add.text(W/2, 7, 'SPACE  PAW-DYSSEY', { fontSize:'15px', fill:'#f1c40f', fontStyle:'bold' }).setOrigin(0.5,0).setDepth(11);
    this.lvTxt    = this.add.text(W-12,  8, '', { fontSize:'11px', fill:'#a78bfa', fontStyle:'bold' }).setOrigin(1,0).setDepth(11);
    this.scoreTxt = this.add.text(W-12, 26, '', { fontSize:'11px', fill:'#94a3b8' }).setOrigin(1,0).setDepth(11);
  }

  // ── Bottom bar (boosters) ────────────────────────────────
  _buildBottomBar() {
    const g = this.add.graphics().setDepth(10);
    g.fillStyle(0x120826);
    g.fillRoundedRect(0, BOT_BAR_Y, W, H-BOT_BAR_Y, { tl:18, tr:18, bl:0, br:0 });
    g.lineStyle(2, 0x7c3aed, 0.7);
    g.strokeRoundedRect(0, BOT_BAR_Y, W, H-BOT_BAR_Y, { tl:18, tr:18, bl:0, br:0 });
    const cy = BOT_BAR_Y + (H-BOT_BAR_Y)/2;
    [{ x:W*0.2,emoji:'🎯',label:'AIM'},{ x:W*0.5,emoji:'💥',label:'BLAST'},{ x:W*0.8,emoji:'🔮',label:'SHIFT'}]
    .forEach(({ x, emoji, label }) => {
      const btn = this.add.circle(x, cy, 27, 0x3b1d6e).setInteractive({ useHandCursor:true }).setDepth(11);
      btn.setStrokeStyle(2, 0x7c3aed);
      this.add.text(x, cy-7,  emoji, { fontSize:'20px' }).setOrigin(0.5).setDepth(12);
      this.add.text(x, cy+17, label, { fontSize:'9px', fill:'#a78bfa', fontStyle:'bold' }).setOrigin(0.5).setDepth(12);
      btn.on('pointerover', () => btn.setFillStyle(0x5b2d8e));
      btn.on('pointerout',  () => btn.setFillStyle(0x3b1d6e));
      btn.on('pointerup',   () => this._onBooster(label));
    });
  }

  // ── Cat-mech ─────────────────────────────────────────────
  _buildMech() {
    this.mechGfx    = this.add.graphics().setDepth(6);
    this.ballSprite = this.add.circle(this.mechX, MECH_Y-36, BALL_R, BALL_WHITE).setDepth(6);
    this.ballSprite.setStrokeStyle(1.5, 0xffffff, 0.5);
    this.lifeTxt    = this.add.text(0, 0, '', { fontSize:'11px', fill:'#ff5555', fontStyle:'bold' })
                        .setOrigin(0).setVisible(false).setDepth(101);
    this.hintTxt    = this.add.text(W/2, MECH_Y+28, '', { fontSize:'11px', fill:'#a78bfa', fontStyle:'bold' })
                        .setOrigin(0.5, 0).setDepth(80);
    this._drawMech();
  }

  _drawMech() {
    const g=this.mechGfx, mx=this.mechX, my=MECH_Y;
    g.clear();
    g.lineStyle(1, 0x7c3aed, 0.3);
    g.strokeLineShape(new Phaser.Geom.Line(PLAY_L+4, my+28, PLAY_R-4, my+28));
    g.fillStyle(0x576574); g.fillEllipse(mx-24,my+16,18,11); g.fillEllipse(mx+24,my+16,18,11);
    g.fillStyle(0xff7043);  g.fillEllipse(mx-24,my+23,13,7);  g.fillEllipse(mx+24,my+23,13,7);
    g.fillStyle(0x8fb8d8); g.fillEllipse(mx,my+4,58,44);
    g.lineStyle(2,0xd4eaf7,0.6); g.strokeEllipse(mx,my+4,58,44);
    g.fillStyle(0x2d7ab5); g.fillEllipse(mx,my-3,36,28);
    g.lineStyle(1.5,0x6ab8e8,0.7); g.strokeEllipse(mx,my-3,36,28);
    g.fillStyle(0xf5cba7); g.fillCircle(mx,my-4,11);
    g.fillTriangle(mx-9,my-13,mx-5,my-13,mx-8,my-20);
    g.fillTriangle(mx+5,my-13,mx+9,my-13,mx+8,my-20);
    g.fillStyle(0xe91e8c,0.7);
    g.fillTriangle(mx-8,my-13,mx-6,my-13,mx-7,my-18);
    g.fillTriangle(mx+6,my-13,mx+8,my-13,mx+7,my-18);
    g.fillStyle(0x1a1a2e); g.fillCircle(mx-3.5,my-6,2.2); g.fillCircle(mx+3.5,my-6,2.2);
    g.fillStyle(0xffffff); g.fillCircle(mx-2.8,my-7,0.9); g.fillCircle(mx+4.2,my-7,0.9);
    g.fillStyle(0xe91e8c); g.fillTriangle(mx-2,my-3,mx+2,my-3,mx,my-1);
    g.lineStyle(1,0xffffff,0.55);
    g.strokeLineShape(new Phaser.Geom.Line(mx-10,my-2.5,mx-4.5,my-1.5));
    g.strokeLineShape(new Phaser.Geom.Line(mx-10,my+0.5,mx-4.5,my+0.0));
    g.strokeLineShape(new Phaser.Geom.Line(mx+4.5,my-1.5,mx+10,my-2.5));
    g.strokeLineShape(new Phaser.Geom.Line(mx+4.5,my+0.0,mx+10,my+0.5));
    g.fillStyle(0x576574); g.fillRect(mx-4,my-40,8,24);
    g.fillStyle(0x2c3e50); g.fillRect(mx-5.5,my-46,11,10);
    g.fillStyle(0x7f8c8d); g.fillRect(mx-5,my-48,10,4);
    if (this.ballSprite) this.ballSprite.x = mx;
  }

  // ── Input ─────────────────────────────────────────────────
  _buildInput() {
    let startX=0, moved=false;
    this.input.on('pointerdown', ptr => {
      startX=ptr.x; moved=false;
      if (this.state===S.AIM && Math.abs(ptr.x-this.mechX)<54 && ptr.y>MECH_Y-55) {
        this.state=S.POS; this.aimGfx.clear(); this._refreshHint();
      }
    });
    this.input.on('pointermove', ptr => {
      if (this.state===S.POS && Math.abs(ptr.x-startX)>5) {
        moved=true;
        this.mechX=Phaser.Math.Clamp(ptr.x, PLAY_L+34, PLAY_R-34);
        this._drawMech();
      } else if (this.state===S.AIM) { this._drawAimLine(ptr.x, ptr.y); }
    });
    this.input.on('pointerup', ptr => {
      if (this.state===S.END) return;
      if (this.state===S.POS && !moved) { this.state=S.AIM; this._refreshHint(); }
      else if (this.state===S.AIM && ptr.y<MECH_Y-22) this._doShoot(ptr.x, ptr.y);
    });
  }

  // ── Aim dotted line ──────────────────────────────────────
  _drawAimLine(tx, ty) {
    this.aimGfx.clear();
    const a = Math.atan2(ty-MECH_Y, tx-this.mechX);
    if (Math.sin(a) >= -0.05) return;
    let x=this.mechX, y=MECH_Y-42, dx=Math.cos(a), dy=Math.sin(a);
    this.aimGfx.fillStyle(0xffffff, 0.42);
    for (let i=0; i<72 && y>TOP_BAR_H; i++) {
      x+=dx*11; y+=dy*11;
      if (x<=PLAY_L+BALL_R) { x=PLAY_L+BALL_R; dx= Math.abs(dx); }
      if (x>=PLAY_R-BALL_R) { x=PLAY_R-BALL_R; dx=-Math.abs(dx); }
      if (y<=PLAY_T+BALL_R) { y=PLAY_T+BALL_R; dy= Math.abs(dy); }
      if (i%2===0) this.aimGfx.fillCircle(x, y, 2);
    }
  }

  // ── Shoot ─────────────────────────────────────────────────
  _doShoot(tx, ty) {
    if (this.shots<=0) return;
    this.aimGfx.clear();
    const a = Math.atan2(ty-MECH_Y, tx-this.mechX);
    const b = this.add.circle(this.mechX, MECH_Y-42, BALL_R, BALL_WHITE).setDepth(50);
    b.setStrokeStyle(1.5, 0xffffff, 0.5);
    b._vx=Math.cos(a)*BALL_SPEED; b._vy=Math.sin(a)*BALL_SPEED;
    b._born=this.time.now; b._entered=false;
    this.ball=b; this.ballColor=null; this.bounces=0;
    this.shots--; this.state=S.SHOOT;
    this.ballSprite.setVisible(false);
    this._refreshUI(); this._refreshHint();
  }

  // ── Ball physics (3 sub-steps/frame) ─────────────────────
  _stepBall(dt) {
    const b = this.ball;
    b.x += b._vx*dt; b.y += b._vy*dt;

    // Coloured side walls (only while above forcefield)
    if (b.y < FORCE_Y) {
      if (b.x <= PLAY_L+BALL_R) { b.x=PLAY_L+BALL_R; b._vx= Math.abs(b._vx); this._paintBall('left',  b.x,b.y); }
      if (b.x >= PLAY_R-BALL_R) { b.x=PLAY_R-BALL_R; b._vx=-Math.abs(b._vx); this._paintBall('right', b.x,b.y); }
    }
    // Coloured top wall
    if (b.y <= PLAY_T+BALL_R) { b.y=PLAY_T+BALL_R; b._vy=Math.abs(b._vy); this._paintBall('top', b.x,b.y); }

    // One-way forcefield
    if (!b._entered && b.y < FORCE_Y) b._entered = true;
    if (b._entered && b._vy>0 && b.y >= FORCE_Y-BALL_R) {
      b.y=FORCE_Y-BALL_R; b._vy=-Math.abs(b._vy); this.bounces++;
    }

    this._checkBlocks();

    if (this.time.now - b._born >= BALL_LIFE || this.bounces >= MAX_BOUNCE) this._ballDie();
  }

  _paintBall(side, bx, by) {
    this.bounces++;
    const key = this._wallSegColor(side, bx, by);
    this.ballColor=key; this.ball.setFillStyle(C[key]);
    this.cameras.main.shake(26, 0.0018);
  }

  // ── Block collision ───────────────────────────────────────
  _checkBlocks() {
    const b = this.ball;
    for (let ri=0; ri<this.grid.length; ri++) {
      const row=this.grid[ri]; if (!row) continue;
      for (let ci=0; ci<COLS; ci++) {
        const cell=row[ci]; if (!cell) continue;
        const rx=GRID_X+ci*BLOCK_SIZE, ry=GRID_Y+ri*BLOCK_SIZE;
        const nx=Phaser.Math.Clamp(b.x,rx,rx+BLOCK_SIZE);
        const ny=Phaser.Math.Clamp(b.y,ry,ry+BLOCK_SIZE);
        if (Math.hypot(b.x-nx,b.y-ny)>BALL_R) continue;
        const cx=rx+BLOCK_SIZE/2, cy=ry+BLOCK_SIZE/2;
        const ovX=BLOCK_SIZE/2+BALL_R-Math.abs(b.x-cx);
        const ovY=BLOCK_SIZE/2+BALL_R-Math.abs(b.y-cy);
        if (ovX<ovY) { b._vx=-b._vx; b.x+=b.x<cx?-ovX:ovX; }
        else          { b._vy=-b._vy; b.y+=b.y<cy?-ovY:ovY; }
        this.bounces++;
        if (this.ballColor===cell.key) { this._popBlock(ri,ci); this.score+=10; this._refreshUI(); }
        return;
      }
    }
  }

  _popBlock(r, c) {
    const cell=this.grid[r][c]; if (!cell) return;
    this.grid[r][c]=null;
    const {x,y}=cellXY(r,c);
    const cx=x+BLOCK_SIZE/2, cy=y+BLOCK_SIZE/2;
    this.tweens.add({ targets:cell.rect, scaleX:1.7, scaleY:1.7, alpha:0, duration:180,
      ease:'Power2', onComplete:()=>cell.rect.destroy() });
    const lbl = this.add.text(cx, cy-2, '+10',
      { fontSize:'10px', fill:'#f1c40f', fontStyle:'bold' }).setOrigin(0.5).setDepth(60);
    this.tweens.add({ targets:lbl, y:cy-26, alpha:0, duration:450, onComplete:()=>lbl.destroy() });
  }

  // ── Ball end of life ──────────────────────────────────────
  _ballDie() {
    if (!this.ball) return;
    this.ball.destroy(); this.ball=null; this.ballColor=null;
    this.lifeTxt?.setVisible(false);
    if (this._isEmpty())  { this._endGame(true);  return; }
    if (this.shots <= 0)  { this._endGame(false); return; }
    this.state=S.POS;
    this.ballSprite.setFillStyle(BALL_WHITE).setVisible(true);
    this._refreshHint();
  }

  _isEmpty() { return this.grid.every(r=>!r||r.every(c=>!c)); }

  // ── End screen ────────────────────────────────────────────
  _endGame(win) {
    this.state=S.END; this.aimGfx.clear(); this.hintTxt?.setText('');
    this.add.rectangle(W/2,H/2,W,H,0x000000,0.80).setDepth(200);
    this.add.text(W/2,H/2-100, win?'🐱 LEVEL CLEAR!':'💀 OUT OF AMMO',
      { fontSize:'28px', fill:win?'#2ecc71':'#e74c3c', fontStyle:'bold' }).setOrigin(0.5).setDepth(201);
    this.add.text(W/2,H/2-54, `Score: ${this.score}`,
      { fontSize:'22px', fill:'#fff' }).setOrigin(0.5).setDepth(201);
    const hasNext = win && this.lvIdx+1 < LEVELS.length;
    if (hasNext) this._uiBtn(W/2,H/2+8,'▶ NEXT LEVEL',0xf1c40f,
      ()=>this.scene.restart({ lvIdx:this.lvIdx+1, score:this.score }));
    this._uiBtn(W/2,H/2+(hasNext?72:8),'↺ RETRY',0xa78bfa,
      ()=>this.scene.restart({ lvIdx:this.lvIdx, score:0 }));
  }

  _onBooster(label) {
    const m={ AIM:'🎯 Precision AIM!', BLAST:'💥 Color BLAST!', SHIFT:'🔮 Color SHIFT!' };
    const t = this.add.text(W/2,MECH_Y-72, m[label],
      { fontSize:'14px', fill:'#f1c40f', fontStyle:'bold' }).setOrigin(0.5).setDepth(90);
    this.tweens.add({ targets:t, y:MECH_Y-120, alpha:0, duration:1400, onComplete:()=>t.destroy() });
  }

  _refreshUI() {
    this.ammoTxt.setText(`×${this.shots}`);
    this.lvTxt.setText(LEVELS[this.lvIdx].title);
    this.scoreTxt.setText(`${this.score} pts`);
  }

  _refreshHint() {
    const m={
      [S.POS]  :'← DRAG TO MOVE  |  TAP TO LOCK →',
      [S.AIM]  :'👆 TAP ABOVE TO SHOOT',
      [S.SHOOT]:'', [S.END]:'',
    };
    this.hintTxt?.setText(m[this.state]??'');
  }

  _uiBtn(x, y, label, hex, cb) {
    const t = this.add.text(x, y, label, {
      fontSize:'20px', fill:'#'+hex.toString(16).padStart(6,'0'),
      fontStyle:'bold', backgroundColor:'#1e0d35', padding:{x:16,y:8}
    }).setOrigin(0.5).setInteractive({ useHandCursor:true }).setDepth(202);
    t.on('pointerover', ()=>t.setAlpha(0.7));
    t.on('pointerout',  ()=>t.setAlpha(1));
    t.on('pointerup',   cb);
  }
}

// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
new Phaser.Game({
  type:Phaser.AUTO, width:W, height:H, backgroundColor:'#0d0015',
  scene:[BootScene, GameScene],
  scale:{ mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH },
  parent:document.body,
});
</script>
