<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Paw-dyssey</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0015; display:flex; justify-content:center;
           align-items:center; width:100vw; height:100vh; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const W          = 360;
const H          = 640;
const WALL_W     = 14;
const TOP_BAR_H  = 90;
const TOP_WALL_H = 18;
const BOT_BAR_Y  = 572;
const MECH_Y     = 528;

// Block & grid sizing
const BLOCK_SIZE = 19;            // ~half original size
const COLS       = 10;
const GAP_BLK    = 3;             // 3-block margin on every side
const GRID_W     = COLS * BLOCK_SIZE;                       // 190
const GRID_X     = Math.round((W - GRID_W) / 2);           // 85  (centered → ~3.75-block gap from each wall)
const GRID_Y     = TOP_BAR_H + TOP_WALL_H + GAP_BLK * BLOCK_SIZE; // 165

// Play-area bounds (inside walls)
const PLAY_L     = WALL_W;
const PLAY_R     = W - WALL_W;
const PLAY_T     = TOP_BAR_H + TOP_WALL_H;
const PLAY_B     = BOT_BAR_Y;

const BALL_R     = 7;
const BALL_SPEED = 630;
const MAX_BOUNCE = 55;
const BALL_WHITE = 0xfff8dc;

const C = {
  r:0xe74c3c, b:0x3498db, g:0x2ecc71,
  y:0xf1c40f, p:0xe91e8c, c:0x00bcd4,
};
const S = { POS:'pos', AIM:'aim', SHOOT:'shoot', END:'end' };

// ═══════════════════════════════════════════════════════════
//  LEVELS  (10-column grids)
//  Wall colours are AUTO-DERIVED: every colour in the grid
//  is guaranteed to appear on at least one wall segment.
// ═══════════════════════════════════════════════════════════
const LEVELS = [
  {
    title:'LEVEL 1', shots:18,
    grid:[
      'rrrrrbbbbb',
      'rrrrrbbbbb',
      'gggggyyyyy',
      'gggggyyyyy',
      'pppppppppp',
    ],
  },
  {
    title:'LEVEL 2', shots:22,
    grid:[
      'rbrbrbrbrb',
      'brbrbrbrbr',
      'gcgcgcgcgc',
      'cgcgcgcgcg',
      'pppppppppp',
      'yyyyyyyyyy',
    ],
  },
  {
    title:'LEVEL 3', shots:28,
    grid:[
      '....rrrr..',
      '..rrrrrr..',
      'rrrrrrrrrr',
      'gggggggggg',
      'yyyyyyyyyy',
      'pppppppppp',
      'cccccccccc',
    ],
  },
];

function cellXY(r, c) {
  return { x: GRID_X + c * BLOCK_SIZE, y: GRID_Y + r * BLOCK_SIZE };
}

// ─── Distribute colours round-robin across three walls ────
function deriveWallColors(grid) {
  const seen = new Set();
  grid.forEach(row => [...row].forEach(k => { if (k && k !== '.' && C[k]) seen.add(k); }));
  const colors = [...seen];
  const dist   = { left:[], right:[], top:[] };
  const order  = ['left','right','top'];
  colors.forEach((col, i) => dist[order[i % 3]].push(col));
  // Guarantee top is never empty
  if (!dist.top.length) dist.top.push(dist.left[0]);
  return dist;
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  create() { this.scene.start('Game', { lvIdx:0, score:0 }); }
}

// ═══════════════════════════════════════════════════════════
//  GAME SCENE
// ═══════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init({ lvIdx=0, score=0 }) {
    this.lvIdx     = lvIdx;
    this.score     = score;
    this.state     = S.POS;
    this.mechX     = W / 2;
    this.ball      = null;
    this.ballColor = null;
    this.bounces   = 0;
  }

  create() {
    const lv     = LEVELS[this.lvIdx];
    this.shots   = lv.shots;
    this.wallSeg = deriveWallColors(lv.grid);   // ← auto-derived
    this._buildBG();
    this._buildWalls();
    this._buildGrid(lv.grid);
    this._buildTopBar();
    this._buildBottomBar();
    this._buildMech();
    this._buildInput();
    this._refreshUI();
    this._refreshHint();
  }

  update(_, dt) {
    if (this.state === S.SHOOT && this.ball) {
      const sub = dt / 1000 / 3;
      for (let i = 0; i < 3 && this.ball; i++) this._stepBall(sub);
    }
  }

  // ─── Background ─────────────────────────────────────────
  _buildBG() {
    this.add.rectangle(W/2, H/2, W, H, 0x1e0d35);
    const g = this.add.graphics();
    g.fillStyle(0x2d1553, 0.4);
    [[68,215],[292,235],[88,372],[278,390],[54,482],[306,462]].forEach(([x,y]) => {
      g.fillCircle(x,y,10);
      [[-9,-11],[9,-11],[-13,-2],[13,-2]].forEach(([dx,dy]) => g.fillCircle(x+dx,y+dy,5));
    });
    // Bring overlay graphics on top (created last = highest depth by default in Phaser 3)
    this.aimGfx = this.add.graphics();
  }

  // ─── Coloured walls (segmented, auto-derived) ────────────
  _buildWalls() {
    const g  = this.add.graphics();
    const ph = PLAY_B - PLAY_T;

    // Helper: draw one wall's segment list
    const drawSegs = (colors, isVert, baseX, baseY, len) => {
      const segLen = len / colors.length;
      colors.forEach((k, i) => {
        const x = isVert ? baseX : baseX + i * segLen;
        const y = isVert ? baseY + i * segLen : baseY;
        const sw = isVert ? WALL_W : segLen;
        const sh = isVert ? segLen : TOP_WALL_H;
        g.fillStyle(C[k]);
        g.fillRect(x, y, sw, sh);
        // colour label
        const lx = x + sw/2, ly = y + sh/2;
        // divider line between segments
        if (i > 0) {
          g.lineStyle(1, 0x000000, 0.5);
          if (isVert) g.strokeLineShape(new Phaser.Geom.Line(x, y, x+WALL_W, y));
          else        g.strokeLineShape(new Phaser.Geom.Line(x, y, x, y+TOP_WALL_H));
        }
      });
    };

    drawSegs(this.wallSeg.left,  true,  0,         PLAY_T, ph);
    drawSegs(this.wallSeg.right, true,  W-WALL_W,  PLAY_T, ph);
    drawSegs(this.wallSeg.top,   false, WALL_W,    TOP_BAR_H, W - 2*WALL_W);

    // Outlines
    g.lineStyle(2, 0x7c3aed, 0.65);
    g.strokeRect(0,         PLAY_T, WALL_W, ph);
    g.strokeRect(W-WALL_W,  PLAY_T, WALL_W, ph);
    g.strokeRect(WALL_W, TOP_BAR_H, W-2*WALL_W, TOP_WALL_H);

    // Bring aimGfx above walls
    if (this.aimGfx) this.children.bringToTop(this.aimGfx);
  }

  /** Return which colour key occupies the wall segment at ball position */
  _wallSegColor(side, bx, by) {
    const colors = this.wallSeg[side];
    if (colors.length === 1) return colors[0];
    if (side === 'left' || side === 'right') {
      const ph   = PLAY_B - PLAY_T;
      const segH = ph / colors.length;
      const idx  = Phaser.Math.Clamp(Math.floor((by - PLAY_T) / segH), 0, colors.length - 1);
      return colors[idx];
    } else {
      const pw   = W - 2 * WALL_W;
      const segW = pw / colors.length;
      const idx  = Phaser.Math.Clamp(Math.floor((bx - WALL_W) / segW), 0, colors.length - 1);
      return colors[idx];
    }
  }

  // ─── Block grid ──────────────────────────────────────────
  _buildGrid(rows) {
    this.grid = rows.map((rowStr, r) =>
      Array.from({ length: COLS }, (_, c) => {
        const k = rowStr[c];
        if (!k || k === '.') return null;
        const { x, y } = cellXY(r, c);
        const rect = this.add.rectangle(
          x + BLOCK_SIZE/2, y + BLOCK_SIZE/2,
          BLOCK_SIZE - 2, BLOCK_SIZE - 2, C[k]
        );
        rect.setStrokeStyle(1, 0x000000, 0.28);
        rect.setScale(0.05);
        this.tweens.add({
          targets: rect, scaleX:1, scaleY:1, duration:100, ease:'Back.Out',
          delay: (r * COLS + c) * 6
        });
        return { key:k, rect };
      })
    );
  }

  // ─── Top bar (cat head) ──────────────────────────────────
  _buildTopBar() {
    const g = this.add.graphics();
    g.fillStyle(0x120826);
    g.fillRect(0, 0, W, TOP_BAR_H - 20);
    g.fillRoundedRect(0, TOP_BAR_H - 40, W, 48, { bl:26, br:26, tl:0, tr:0 });
    g.fillStyle(0x7c3aed);
    g.fillTriangle(42,2, 86,2, 64,-28);
    g.fillTriangle(W-86,2, W-42,2, W-64,-28);
    g.fillStyle(0xe91e8c, 0.65);
    g.fillTriangle(50,2, 78,2, 64,-18);
    g.fillTriangle(W-78,2, W-50,2, W-64,-18);
    g.lineStyle(2, 0x7c3aed, 0.85);
    g.strokeRoundedRect(0, 0, W, TOP_BAR_H, { bl:26, br:26, tl:0, tr:0 });
    g.strokeTriangle(42,2, 86,2, 64,-28);
    g.strokeTriangle(W-86,2, W-42,2, W-64,-28);

    this.add.text(14, 8,  'AMMO', { fontSize:'10px', fill:'#a78bfa', fontStyle:'bold' });
    this.ammoTxt  = this.add.text(14, 22, '', { fontSize:'24px', fill:'#fff', fontStyle:'bold' });
    this.add.text(W/2, 7, 'SPACE  PAW-DYSSEY',
      { fontSize:'15px', fill:'#f1c40f', fontStyle:'bold' }).setOrigin(0.5, 0);
    this.lvTxt    = this.add.text(W-12,  8, '', { fontSize:'11px', fill:'#a78bfa', fontStyle:'bold' }).setOrigin(1,0);
    this.scoreTxt = this.add.text(W-12, 26, '', { fontSize:'11px', fill:'#94a3b8' }).setOrigin(1,0);
  }

  // ─── Bottom bar (boosters) ───────────────────────────────
  _buildBottomBar() {
    const g  = this.add.graphics();
    g.fillStyle(0x120826);
    g.fillRoundedRect(0, BOT_BAR_Y, W, H-BOT_BAR_Y, { tl:18, tr:18, bl:0, br:0 });
    g.lineStyle(2, 0x7c3aed, 0.7);
    g.strokeRoundedRect(0, BOT_BAR_Y, W, H-BOT_BAR_Y, { tl:18, tr:18, bl:0, br:0 });

    const cy = BOT_BAR_Y + (H - BOT_BAR_Y) / 2;
    [
      { x:W*0.2, emoji:'🎯', label:'AIM'   },
      { x:W*0.5, emoji:'💥', label:'BLAST' },
      { x:W*0.8, emoji:'🔮', label:'SHIFT' },
    ].forEach(({ x, emoji, label }) => {
      const btn = this.add.circle(x, cy, 27, 0x3b1d6e).setInteractive({ useHandCursor:true });
      btn.setStrokeStyle(2, 0x7c3aed);
      this.add.text(x, cy-7,  emoji, { fontSize:'20px' }).setOrigin(0.5);
      this.add.text(x, cy+17, label, { fontSize:'9px', fill:'#a78bfa', fontStyle:'bold' }).setOrigin(0.5);
      btn.on('pointerover', () => btn.setFillStyle(0x5b2d8e));
      btn.on('pointerout',  () => btn.setFillStyle(0x3b1d6e));
      btn.on('pointerup',   () => this._onBooster(label));
    });
  }

  // ─── Cat-mech ────────────────────────────────────────────
  _buildMech() {
    this.mechGfx    = this.add.graphics();
    this.ballSprite = this.add.circle(this.mechX, MECH_Y - 36, BALL_R, BALL_WHITE);
    this.ballSprite.setStrokeStyle(1.5, 0xffffff, 0.5);
    this.hintTxt = this.add.text(W/2, MECH_Y + 28, '', {
      fontSize:'11px', fill:'#a78bfa', fontStyle:'bold'
    }).setOrigin(0.5, 0);
    this._drawMech();
  }

  _drawMech() {
    const g=this.mechGfx, mx=this.mechX, my=MECH_Y;
    g.clear();
    g.lineStyle(1, 0x7c3aed, 0.3);
    g.strokeLineShape(new Phaser.Geom.Line(WALL_W+4, my+28, W-WALL_W-4, my+28));
    g.fillStyle(0x576574); g.fillEllipse(mx-24,my+16,18,11); g.fillEllipse(mx+24,my+16,18,11);
    g.fillStyle(0xff7043);  g.fillEllipse(mx-24,my+23,13,7);  g.fillEllipse(mx+24,my+23,13,7);
    g.fillStyle(0x8fb8d8); g.fillEllipse(mx,my+4,58,44);
    g.lineStyle(2,0xd4eaf7,0.6); g.strokeEllipse(mx,my+4,58,44);
    g.fillStyle(0x2d7ab5); g.fillEllipse(mx,my-3,36,28);
    g.lineStyle(1.5,0x6ab8e8,0.7); g.strokeEllipse(mx,my-3,36,28);
    g.fillStyle(0xf5cba7); g.fillCircle(mx,my-4,11);
    g.fillTriangle(mx-9,my-13,mx-5,my-13,mx-8,my-20);
    g.fillTriangle(mx+5,my-13,mx+9,my-13,mx+8,my-20);
    g.fillStyle(0xe91e8c,0.7);
    g.fillTriangle(mx-8,my-13,mx-6,my-13,mx-7,my-18);
    g.fillTriangle(mx+6,my-13,mx+8,my-13,mx+7,my-18);
    g.fillStyle(0x1a1a2e); g.fillCircle(mx-3.5,my-6,2.2); g.fillCircle(mx+3.5,my-6,2.2);
    g.fillStyle(0xffffff); g.fillCircle(mx-2.8,my-7,0.9); g.fillCircle(mx+4.2,my-7,0.9);
    g.fillStyle(0xe91e8c); g.fillTriangle(mx-2,my-3,mx+2,my-3,mx,my-1);
    g.lineStyle(1,0xffffff,0.55);
    g.strokeLineShape(new Phaser.Geom.Line(mx-10,my-2.5,mx-4.5,my-1.5));
    g.strokeLineShape(new Phaser.Geom.Line(mx-10,my+0.5,mx-4.5,my+0.0));
    g.strokeLineShape(new Phaser.Geom.Line(mx+4.5,my-1.5,mx+10,my-2.5));
    g.strokeLineShape(new Phaser.Geom.Line(mx+4.5,my+0.0,mx+10,my+0.5));
    g.fillStyle(0x576574); g.fillRect(mx-4,my-40,8,24);
    g.fillStyle(0x2c3e50); g.fillRect(mx-5.5,my-46,11,10);
    g.fillStyle(0x7f8c8d); g.fillRect(mx-5,my-48,10,4);
    if (this.ballSprite) this.ballSprite.x = mx;
  }

  // ─── Input ───────────────────────────────────────────────
  _buildInput() {
    let startX = 0, moved = false;
    this.input.on('pointerdown', ptr => {
      startX = ptr.x; moved = false;
      if (this.state === S.AIM && Math.abs(ptr.x - this.mechX) < 54 && ptr.y > MECH_Y - 55) {
        this.state = S.POS; this.aimGfx.clear(); this._refreshHint();
      }
    });
    this.input.on('pointermove', ptr => {
      if (this.state === S.POS) {
        if (Math.abs(ptr.x - startX) > 5) {
          moved = true;
          this.mechX = Phaser.Math.Clamp(ptr.x, PLAY_L + 34, PLAY_R - 34);
          this._drawMech();
        }
      } else if (this.state === S.AIM) {
        this._drawAimLine(ptr.x, ptr.y);
      }
    });
    this.input.on('pointerup', ptr => {
      if (this.state === S.END) return;
      if (this.state === S.POS && !moved) { this.state = S.AIM; this._refreshHint(); }
      else if (this.state === S.AIM && ptr.y < MECH_Y - 22) this._doShoot(ptr.x, ptr.y);
    });
  }

  // ─── Aim line ────────────────────────────────────────────
  _drawAimLine(tx, ty) {
    this.aimGfx.clear();
    const a = Math.atan2(ty - MECH_Y, tx - this.mechX);
    if (Math.sin(a) >= -0.05) return;
    let x=this.mechX, y=MECH_Y-42, dx=Math.cos(a), dy=Math.sin(a);
    this.aimGfx.fillStyle(0xffffff, 0.42);
    for (let i=0; i<70 && y>TOP_BAR_H; i++) {
      x+=dx*11; y+=dy*11;
      if (x<=PLAY_L+BALL_R)  { x=PLAY_L+BALL_R;  dx= Math.abs(dx); }
      if (x>=PLAY_R-BALL_R)  { x=PLAY_R-BALL_R;  dx=-Math.abs(dx); }
      if (y<=PLAY_T+BALL_R)  { y=PLAY_T+BALL_R;  dy= Math.abs(dy); }
      if (i%2===0) this.aimGfx.fillCircle(x, y, 2);
    }
  }

  // ─── Shoot ───────────────────────────────────────────────
  _doShoot(tx, ty) {
    if (this.shots <= 0) return;
    this.aimGfx.clear();
    const a = Math.atan2(ty - MECH_Y, tx - this.mechX);
    const b = this.add.circle(this.mechX, MECH_Y - 42, BALL_R, BALL_WHITE);
    b.setStrokeStyle(1.5, 0xffffff, 0.5);
    b._vx = Math.cos(a) * BALL_SPEED;
    b._vy = Math.sin(a) * BALL_SPEED;
    this.ball = b; this.ballColor = null; this.bounces = 0;
    this.shots--; this.state = S.SHOOT;
    this.ballSprite.setVisible(false);
    this._refreshUI(); this._refreshHint();
  }

  // ─── Ball physics (3 sub-steps) ──────────────────────────
  _stepBall(dt) {
    const b = this.ball;
    b.x += b._vx * dt;
    b.y += b._vy * dt;

    if (b.x <= PLAY_L + BALL_R)  { b.x = PLAY_L + BALL_R;  b._vx =  Math.abs(b._vx); this._paintBall('left',  b.x, b.y); }
    if (b.x >= PLAY_R - BALL_R)  { b.x = PLAY_R - BALL_R;  b._vx = -Math.abs(b._vx); this._paintBall('right', b.x, b.y); }
    if (b.y <= PLAY_T + BALL_R)  { b.y = PLAY_T + BALL_R;  b._vy =  Math.abs(b._vy); this._paintBall('top',   b.x, b.y); }

    this._checkBlocks();
    if (b.y > MECH_Y + 55 || this.bounces >= MAX_BOUNCE) this._ballDie();
  }

  /** Ball hits a wall → read colour of that wall segment and adopt it */
  _paintBall(side, bx, by) {
    this.bounces++;
    const key = this._wallSegColor(side, bx, by);
    this.ballColor = key;
    this.ball.setFillStyle(C[key]);
    this.cameras.main.shake(28, 0.002);
  }

  // ─── Block collisions ────────────────────────────────────
  _checkBlocks() {
    const b = this.ball;
    for (let ri = 0; ri < this.grid.length; ri++) {
      const row = this.grid[ri]; if (!row) continue;
      for (let ci = 0; ci < COLS; ci++) {
        const cell = row[ci]; if (!cell) continue;
        const rx = GRID_X + ci * BLOCK_SIZE, ry = GRID_Y + ri * BLOCK_SIZE;
        const nx = Phaser.Math.Clamp(b.x, rx, rx + BLOCK_SIZE);
        const ny = Phaser.Math.Clamp(b.y, ry, ry + BLOCK_SIZE);
        if (Math.hypot(b.x - nx, b.y - ny) > BALL_R) continue;
        // Reflect on axis of minimum overlap
        const cx = rx + BLOCK_SIZE/2, cy = ry + BLOCK_SIZE/2;
        const ovX = BLOCK_SIZE/2 + BALL_R - Math.abs(b.x - cx);
        const ovY = BLOCK_SIZE/2 + BALL_R - Math.abs(b.y - cy);
        if (ovX < ovY) { b._vx = -b._vx; b.x += b.x < cx ? -ovX : ovX; }
        else           { b._vy = -b._vy; b.y += b.y < cy ? -ovY : ovY; }
        this.bounces++;
        if (this.ballColor === cell.key) { this._popBlock(ri, ci); this.score += 10; this._refreshUI(); }
        return;
      }
    }
  }

  _popBlock(r, c) {
    const cell = this.grid[r][c]; if (!cell) return;
    this.grid[r][c] = null;
    const { x, y } = cellXY(r, c);
    const cx = x + BLOCK_SIZE/2, cy = y + BLOCK_SIZE/2;
    this.tweens.add({ targets:cell.rect, scaleX:1.6, scaleY:1.6, alpha:0, duration:180,
      ease:'Power2', onComplete:() => cell.rect.destroy() });
    const lbl = this.add.text(cx, cy-2, '+10',
      { fontSize:'10px', fill:'#f1c40f', fontStyle:'bold' }).setOrigin(0.5);
    this.tweens.add({ targets:lbl, y:cy-26, alpha:0, duration:480, onComplete:()=>lbl.destroy() });
  }

  // ─── Ball out of play ────────────────────────────────────
  _ballDie() {
    if (!this.ball) return;
    this.ball.destroy(); this.ball = null; this.ballColor = null;
    if (this._isEmpty())  { this._endGame(true);  return; }
    if (this.shots <= 0)  { this._endGame(false); return; }
    this.state = S.POS;
    this.ballSprite.setFillStyle(BALL_WHITE).setVisible(true);
    this._refreshHint();
  }

  _isEmpty() { return this.grid.every(r => !r || r.every(c => !c)); }

  // ─── End screen ──────────────────────────────────────────
  _endGame(win) {
    this.state = S.END; this.aimGfx.clear(); this.hintTxt?.setText('');
    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.78);
    this.add.text(W/2, H/2-100, win ? '🐱 LEVEL CLEAR!' : '💀 OUT OF AMMO',
      { fontSize:'28px', fill:win?'#2ecc71':'#e74c3c', fontStyle:'bold' }).setOrigin(0.5);
    this.add.text(W/2, H/2-54, `Score: ${this.score}`,
      { fontSize:'22px', fill:'#fff' }).setOrigin(0.5);
    const hasNext = win && this.lvIdx + 1 < LEVELS.length;
    if (hasNext) this._uiBtn(W/2, H/2+8, '▶ NEXT LEVEL', 0xf1c40f,
      () => this.scene.restart({ lvIdx: this.lvIdx+1, score: this.score }));
    this._uiBtn(W/2, H/2+(hasNext?72:8), '↺ RETRY', 0xa78bfa,
      () => this.scene.restart({ lvIdx: this.lvIdx, score: 0 }));
  }

  // ─── Booster stubs ───────────────────────────────────────
  _onBooster(label) {
    const m = { AIM:'🎯 Precision AIM!', BLAST:'💥 Color BLAST!', SHIFT:'🔮 Color SHIFT!' };
    const t = this.add.text(W/2, MECH_Y-72, m[label],
      { fontSize:'14px', fill:'#f1c40f', fontStyle:'bold' }).setOrigin(0.5);
    this.tweens.add({ targets:t, y:MECH_Y-120, alpha:0, duration:1400, onComplete:()=>t.destroy() });
  }

  // ─── UI helpers ──────────────────────────────────────────
  _refreshUI() {
    this.ammoTxt.setText(`×${this.shots}`);
    this.lvTxt.setText(LEVELS[this.lvIdx].title);
    this.scoreTxt.setText(`${this.score} pts`);
  }

  _refreshHint() {
    const m = {
      [S.POS]  : '← DRAG TO MOVE  |  TAP TO LOCK →',
      [S.AIM]  : '👆 TAP ABOVE TO SHOOT',
      [S.SHOOT]: '', [S.END]: '',
    };
    this.hintTxt?.setText(m[this.state] ?? '');
  }

  _uiBtn(x, y, label, hex, cb) {
    const t = this.add.text(x, y, label, {
      fontSize:'20px', fill:'#'+hex.toString(16).padStart(6,'0'),
      fontStyle:'bold', backgroundColor:'#1e0d35', padding:{ x:16, y:8 }
    }).setOrigin(0.5).setInteractive({ useHandCursor:true });
    t.on('pointerover', () => t.setAlpha(0.7));
    t.on('pointerout',  () => t.setAlpha(1));
    t.on('pointerup',   cb);
  }
}

// ═══════════════════════════════════════════════════════════

new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, backgroundColor: '#0d0015',
  scene: [BootScene, GameScene],
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  parent: document.body,
});
</script>
